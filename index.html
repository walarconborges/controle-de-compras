<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso | Controle de Compras</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container py-5">
    <main class="row justify-content-center">
      <section class="col-md-8 col-lg-6">
        <div class="app-box">
          <header class="mb-4 text-center">
            <h1 class="h3 mb-2">Controle de Compras</h1>
            <p class="text-muted mb-0">Escolha como deseja acessar o sistema.</p>
          </header>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
                required
              >
            </div>

            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input
                type="password"
                class="form-control"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
              >
            </div>

            <div id="login-message" class="mb-3 text-danger small" aria-live="polite"></div>

            <input type="hidden" id="auth-token" name="auth-token" value="">

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">
                Entrar
              </button>

              <a href="homepage.html" class="btn btn-outline-secondary">
                Acessar como visitante
              </a>
            </div>
          </form>

          <div class="mt-4">
            <p class="small text-muted mb-0">
              O login ainda é apenas simulado nesta fase do projeto.
            </p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
