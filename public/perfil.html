<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | Controle de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="perfil.css">
</head>
<body>
  <div class="container py-4">
    <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 mb-1">Perfil</h1>
        <p class="text-muted mb-0">Dados do usuário e gestão do grupo.</p>
      </div>
      <div class="d-flex gap-2">
        <a href="homepage.html" class="btn btn-outline-secondary">Voltar</a>
        <button type="button" class="btn btn-outline-danger" id="btn-logout">Sair</button>
      </div>
    </header>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Dados do usuário</h2>
        <div id="perfil-dados" class="small text-muted">Carregando...</div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Membros do grupo</h2>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="perfil-membros"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <h2 class="h5 mb-0">Solicitações pendentes</h2>
          <span class="small text-muted" id="perfil-admin-aviso"></span>
        </div>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-solicitacoes"></tbody>
          </table>
        </div>
        <div class="small mt-3" id="perfil-message" aria-live="polite"></div>
      </div>
    </section>
  </div>
  <script src="perfil.js"></script>
</body>
</html>
