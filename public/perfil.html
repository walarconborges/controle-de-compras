<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | Controle de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="perfil.css">
</head>
<body>
  <div class="container py-4">
    <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 mb-0">Perfil</h1>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="homepage.html" class="btn btn-outline-secondary">Início</a>
        <a href="painel-sistema.html" class="btn btn-outline-dark" id="link-painel-sistema" hidden>Painel do Sistema</a>
        <button type="button" class="btn btn-outline-danger" id="btn-logout">Sair</button>
      </div>
    </header>

    <div id="perfil-message" aria-live="polite" class="mb-3"></div>

    <section class="card mb-4">
      <div class="card-body">
        <div id="perfil-dados" class="small text-muted mb-3">Carregando...</div>

        <form id="perfil-form" class="row g-3">
          <div class="col-md-4">
            <label class="form-label" for="perfil-nome">Nome</label>
            <input class="form-control" id="perfil-nome" type="text">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="perfil-sobrenome">Sobrenome</label>
            <input class="form-control" id="perfil-sobrenome" type="text">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="perfil-email">E-mail</label>
            <input class="form-control" id="perfil-email" type="email">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="perfil-senha">Nova senha</label>
            <input class="form-control" id="perfil-senha" type="password" placeholder="Opcional">
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Salvar perfil</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card mb-4" id="secao-vinculos" hidden>
      <div class="card-body">
        <h2 class="h5 mb-3">Vínculos com grupos</h2>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Grupo</th>
                <th>Código</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-vinculos"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <h2 class="h5 mb-0">Membros do grupo</h2>
        </div>

        <form id="convite-form" class="row g-3 mb-3" hidden>
          <div class="col-md-5">
            <input class="form-control" id="convite-email" type="email" placeholder="E-mail do usuário existente">
          </div>
          <div class="col-md-3">
            <select class="form-select" id="convite-papel">
              <option value="membro">membro</option>
              <option value="adminGrupo">adminGrupo</option>
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-outline-primary" type="submit">Convidar usuário existente</button>
          </div>
        </form>

        <div class="d-flex gap-2 mb-3">
          <button class="btn btn-outline-warning" id="btn-sair-grupo" type="button">Sair do grupo</button>
        </div>

        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr id="perfil-membros-head">
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end" id="perfil-membros-th-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-membros"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card" id="secao-pendencias" hidden>
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <h2 class="h5 mb-0">Pendências do grupo</h2>
        </div>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-solicitacoes"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="js/perfil.js"></script>
</body>
</html>
