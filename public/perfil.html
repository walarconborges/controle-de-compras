<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | Controle de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="homepage.css">
  <link rel="stylesheet" href="perfil.css">
</head>
<body>
  <header>
    <nav class="site-map-top">
      <div class="container py-2">
        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
          <div class="d-flex flex-wrap gap-2 justify-content-center align-items-center">
            <button
              type="button"
              class="btn btn-outline-secondary btn-sm d-lg-none"
              id="btn-menu-mobile"
              aria-label="Abrir menu de navegação"
              aria-controls="menu-lateral-perfil"
              aria-expanded="false"
            >
              ☰ Menu
            </button>

            <a href="homepage.html" class="btn btn-outline-secondary btn-sm">Home</a>
            <a href="perfil.html" class="btn btn-primary btn-sm" aria-current="page">Perfil</a>
            <a href="painel-sistema.html" class="btn btn-outline-dark btn-sm" id="link-painel-sistema" hidden>Painel do Sistema</a>
          </div>

          <div class="d-flex flex-wrap gap-2 align-items-center">
            <button type="button" class="btn btn-outline-danger btn-sm" id="btn-logout">Sair</button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <aside
    class="site-map-left"
    id="menu-lateral-perfil"
    aria-label="Menu lateral"
    aria-hidden="true"
  >
    <div class="site-map-left-hover-area" aria-hidden="true"></div>

    <div class="site-map-left-content" id="menu-lateral-conteudo" tabindex="-1">
      <div class="p-3">
        <div class="d-flex justify-content-between align-items-center mb-3 d-lg-none">
          <h2 class="h6 mb-0">Menu</h2>
          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            id="btn-fechar-menu-mobile"
            aria-label="Fechar menu de navegação"
          >
            Fechar
          </button>
        </div>

        <h2 class="h6 mb-3 d-none d-lg-block">Menu</h2>

        <div class="d-grid gap-2">
          <a href="homepage.html" class="btn btn-outline-secondary btn-sm">Home</a>
          <a href="estoque.html" class="btn btn-outline-secondary btn-sm">Estoque</a>
                    <a href="compra.html" class="btn btn-outline-secondary btn-sm">Compra</a>
          <a href="perfil.html" class="btn btn-primary btn-sm" aria-current="page">Perfil</a>
        </div>
      </div>
    </div>
  </aside>

  <div
    class="menu-mobile-backdrop d-lg-none"
    id="menu-mobile-backdrop"
    hidden
    aria-hidden="true"
  ></div>

  <div class="container py-4">
    <header class="d-flex justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="h3 mb-0">Perfil</h1>
      </div>
    </header>

    <section class="card mb-4">
      <div class="card-body">
        <div id="perfil-dados" class="small text-muted mb-3">Carregando...</div>

        <form id="perfil-form" class="row g-3">
          <div class="col-md-3">
            <label class="form-label" for="perfil-nome">Nome</label>
            <input class="form-control" id="perfil-nome" type="text">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="perfil-sobrenome">Sobrenome</label>
            <input class="form-control" id="perfil-sobrenome" type="text">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="perfil-email">E-mail</label>
            <input class="form-control" id="perfil-email" type="email">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="perfil-senha">Nova senha</label>
            <input class="form-control" id="perfil-senha" type="password" placeholder="Opcional">
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Salvar perfil</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card mb-4" id="secao-vinculos" hidden>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Grupo</th>
                <th>Código</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end" id="th-vinculos-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-vinculos"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <h2 class="h5 mb-0">Membros do grupo</h2>
          <span class="small text-muted" id="perfil-admin-aviso" hidden></span>
        </div>

        <form id="convite-form" class="row g-3 mb-3" hidden>
          <div class="col-md-5">
            <input class="form-control" id="convite-email" type="email" placeholder="E-mail do usuário existente">
          </div>
          <div class="col-md-3">
            <select class="form-select" id="convite-papel">
              <option value="membro">membro</option>
              <option value="adminGrupo">adminGrupo</option>
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-outline-primary" type="submit">Convidar usuário existente</button>
          </div>
        </form>

        <div class="d-flex gap-2 mb-3">
          <button class="btn btn-outline-warning" id="btn-sair-grupo" type="button">Sair do grupo</button>
        </div>

        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end" id="th-membros-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-membros"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card" id="secao-pendencias" hidden>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Papel</th>
                <th>Status</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="perfil-solicitacoes"></tbody>
          </table>
        </div>
        <div class="small mt-3" id="perfil-message" aria-live="polite"></div>
      </div>
    </section>
  </div>
  <script type="module" src="js/perfil.js"></script>
</body>
</html>
