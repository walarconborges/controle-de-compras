<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso | Controle de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container py-5">
    <main class="row justify-content-center align-items-center min-vh-100 py-4 g-4">
      <section class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="app-box">
          <header class="mb-4 text-center">
            <h1 class="h3 mb-2">Controle de Compras</h1>
            <p class="text-muted mb-0">Entre com seu e-mail e senha para acessar o sistema.</p>
          </header>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu e-mail" autocomplete="email" inputmode="email" aria-describedby="login-message" required>
            </div>

            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" aria-describedby="login-message" required>
            </div>

            <div id="login-message" class="mb-3 small" aria-live="polite" role="status"></div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary" id="btn-entrar">Entrar</button>
            </div>
          </form>

          <div class="mt-3 text-center">
            <button type="button" class="btn btn-link p-0 text-decoration-none" data-bs-toggle="modal" data-bs-target="#cadastroModal" id="btn-abrir-cadastro">
              Criar conta
            </button>
          </div>
        </div>
      </section>

      <section class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="modal fade" id="cadastroModal" tabindex="-1" aria-labelledby="cadastroModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h2 class="modal-title h5 mb-0" id="cadastroModalLabel">Criar conta</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
              </div>

              <div class="modal-body">
                <form id="cadastro-form" novalidate>
                  <div class="mb-3">
                    <label for="cadastro-nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="cadastro-nome" name="nome" placeholder="Digite seu nome" autocomplete="given-name" aria-describedby="cadastro-message" required>
                  </div>

                  <div class="mb-3">
                    <label for="cadastro-sobrenome" class="form-label">Sobrenome</label>
                    <input type="text" class="form-control" id="cadastro-sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" autocomplete="family-name" aria-describedby="cadastro-message" required>
                  </div>

                  <div class="mb-3">
                    <label for="cadastro-email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="cadastro-email" name="email" placeholder="Digite seu e-mail" autocomplete="email" inputmode="email" aria-describedby="cadastro-message" required>
                  </div>

                  <div class="mb-3">
                    <label for="cadastro-senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="cadastro-senha" name="senha" placeholder="Digite sua senha" autocomplete="new-password" aria-describedby="cadastro-message" required>
                  </div>

                  <div class="mb-2 position-relative">
                    <label for="cadastro-grupo" class="form-label">Grupo</label>
                    <input type="text" class="form-control" id="cadastro-grupo" name="grupoNome" placeholder="Ex.: FAMILIA" autocomplete="off" maxlength="40" aria-describedby="cadastro-message cadastro-grupo-ajuda" required>
                    <div id="cadastro-grupo-ajuda" class="form-text">Use uma única palavra. Ao digitar, grupos parecidos podem aparecer.</div>
                    <div id="cadastro-sugestoes-grupo" class="list-group mt-2" hidden></div>
                  </div>

                  <div id="cadastro-message" class="small" aria-live="polite" aria-atomic="true" role="status"></div>
                </form>
              </div>

              <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btn-cadastrar" form="cadastro-form">Cadastrar</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
