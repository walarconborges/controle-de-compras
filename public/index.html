<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso | Controle de Compras</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container py-5">
    <main class="row justify-content-center align-items-center min-vh-100 py-4">
      <section class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="app-box">
          <header class="mb-4 text-center">
            <h1 class="h3 mb-2">Controle de Compras</h1>
            <p class="text-muted mb-0">Entre com seu e-mail e senha para acessar o sistema.</p>
          </header>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
                inputmode="email"
                aria-describedby="login-message"
                required
              >
            </div>

            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input
                type="password"
                class="form-control"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                aria-describedby="login-message"
                required
              >
            </div>

            <div
              id="login-message"
              class="mb-3 small"
              aria-live="polite"
              role="status"
            ></div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary" id="btn-entrar">
                Entrar
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
