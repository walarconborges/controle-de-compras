<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aguardando aprovação | Controle de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="aguardando.css">
</head>
<body>
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <section class="aguardando-box text-center w-100">
      <h1 class="h3 mb-3">Aguarde ser aceito no grupo</h1>
      <p class="text-muted mb-2">Seu cadastro foi criado, mas o administrador do grupo ainda precisa aprovar sua entrada.</p>
      <p class="small text-muted mb-4" id="aguardando-info">Carregando dados do vínculo...</p>
      <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
        <button type="button" class="btn btn-primary" id="btn-atualizar-status">Atualizar status</button>
        <button type="button" class="btn btn-outline-secondary" id="btn-sair">Sair</button>
      </div>
      <div class="small mt-3" id="aguardando-message" aria-live="polite"></div>
    </section>
  </main>
  <script type="module" src="js/aguardando.js"></script>
</body>
</html>
